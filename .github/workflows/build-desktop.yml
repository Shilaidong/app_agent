name: build-desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  mac:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: bun install
      - name: Verify
        run: |
          bun run verify
          bun run verify:e2e
          bun run typecheck:desktop
      - name: Build macOS package
        # This project uses only its checked-in ad-hoc signer (`codesign --sign -`).
        # electron-builder otherwise skips even that signer for pull requests,
        # leaving a renamed Electron bundle with an incomplete resource seal.
        env:
          CSC_FOR_PULL_REQUEST: "true"
        run: bun run release:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terra-edu-application-agent-mac
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/release-notes/*.md
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          zip=packages/desktop/dist/terra-edu-application-agent-mac-arm64.zip
          dmg=packages/desktop/dist/terra-edu-application-agent-mac-arm64.dmg
          test -f "$zip"
          assets=("$zip")
          if [[ -f "$dmg" ]]; then
            assets+=("$dmg")
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
            gh release edit "$TAG_NAME" \
              --title "Terra-Edu Application Agent $TAG_NAME" \
              --notes-file packages/desktop/dist/release-notes/mac-free.md \
              --latest
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "Terra-Edu Application Agent $TAG_NAME" \
              --notes-file packages/desktop/dist/release-notes/mac-free.md \
              --latest
          fi
