name: build-desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mac:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install
      - name: Verify
        run: |
          bun run verify
          bun run verify:e2e
          bun run typecheck:desktop
      - name: Build macOS package
        run: bun run release:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terra-edu-application-agent-mac
          path: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/release-notes/*.md
