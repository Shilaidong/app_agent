<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Native Alert Demo — Major is required</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "PingFang SC", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f5f8;
        color: #1b2430;
      }
      main {
        max-width: 720px;
        margin: 48px auto;
        padding: 28px 32px 36px;
        background: #fff;
        border: 1px solid #d7dee8;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(20, 40, 80, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.5;
        color: #516074;
      }
      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 13px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #c9d3e0;
        border-radius: 8px;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      #save {
        background: #1f6feb;
        color: #fff;
      }
      #cancel {
        background: #e8eef6;
        color: #334155;
      }
      #status {
        margin-top: 18px;
        min-height: 24px;
        font-size: 14px;
        font-weight: 600;
      }
      #status.open {
        color: #b45309;
      }
      #status.closed {
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Add Institution（原生弹窗演示）</h1>
      <p>
        点 Save 会弹出和申请站一样的浏览器原生 alert：<strong>Major is required.</strong>
        Agent 会用 Ego Lite 的 <code>pageInfo</code> 读文案，再用
        <code>Page.handleJavaScriptDialog</code> 点掉「确定」。
      </p>

      <label for="institution">Institution</label>
      <input id="institution" value="Nottingham Ningbo" />

      <label for="major">Major（故意留空，用来触发校验弹窗）</label>
      <input id="major" value="" placeholder="留空" />

      <div class="row">
        <button id="save" type="button">Save</button>
        <button id="cancel" type="button">Cancel</button>
      </div>

      <div id="status">等待点击 Save…</div>
    </main>

    <script>
      const status = document.getElementById("status")
      document.getElementById("save").addEventListener("click", () => {
        status.className = "open"
        status.textContent = "原生 alert 已打开：Major is required."
        alert("Major is required.")
        status.className = "closed"
        status.textContent = "原生 alert 已关闭（accept）。页面可继续操作。"
        document.body.dataset.alertState = "accepted"
      })
    </script>
  </body>
</html>
